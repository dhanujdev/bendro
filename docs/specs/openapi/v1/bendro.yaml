openapi: 3.1.0
info:
  title: Bendro API
  version: 0.1.0
  description: |
    REST API for Bendro — AI-assisted flexibility copilot.
    All routes are Next.js Route Handlers under `src/app/api/*/route.ts`.

    **Auth status (Phase 3):** Auth.js v5 session cookie required on
    protected routes. `userId` is resolved server-side from the session —
    it is never accepted from request body or query. See ADR-0004 for the
    provider list and ADR rationale.

    Sign-in flow: `POST /api/auth/signin/{provider}` (Resend magic link
    or Google OAuth). Session cookie is `authjs.session-token`. Sign-out:
    `POST /api/auth/signout`. These auth endpoints are provided by
    `[...nextauth]` and are not documented individually here.

    **Contract-first:** every route under `src/app/api/` must be represented
    in this file before implementation. Enforced by
    `.claude/hooks/contract-guard.py`.
  contact:
    name: Bendro
    url: https://github.com/dhanujdev/bendro

servers:
  - url: http://localhost:3000/api
    description: Local dev (Next.js)
  - url: https://{project}.vercel.app/api
    description: Vercel preview
    variables:
      project:
        default: bendro
  - url: https://bendro.app/api
    description: Production

tags:
  - name: catalog
    description: Public read-only catalog (stretches, routines)
  - name: sessions
    description: Workout sessions (authenticated in Phase 3+)
  - name: progress
    description: User progress & streaks

paths:
  /stretches:
    get:
      tags: [catalog]
      summary: List stretches
      operationId: listStretches
      parameters:
        - { name: bodyArea,  in: query, schema: { $ref: "#/components/schemas/BodyArea" } }
        - { name: intensity, in: query, schema: { $ref: "#/components/schemas/Intensity" } }
        - { name: limit,     in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: offset,    in: query, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        "200":
          description: Paginated stretch list
          content:
            application/json:
              schema:
                type: object
                required: [data, total, limit, offset]
                properties:
                  data:   { type: array, items: { $ref: "#/components/schemas/Stretch" } }
                  total:  { type: integer, minimum: 0 }
                  limit:  { type: integer }
                  offset: { type: integer }
        "400": { $ref: "#/components/responses/ValidationError" }

  /routines:
    get:
      tags: [catalog]
      summary: List routines
      operationId: listRoutines
      parameters:
        - { name: goal,            in: query, schema: { $ref: "#/components/schemas/Goal" } }
        - { name: level,           in: query, schema: { $ref: "#/components/schemas/Intensity" } }
        - { name: isPremium,       in: query, schema: { type: boolean } }
        - { name: maxDurationSec,  in: query, schema: { type: integer, minimum: 1 } }
        - { name: q,               in: query, description: Free-text search across title/slug/description (case-insensitive), schema: { type: string, minLength: 1, maxLength: 120 } }
        - { name: bodyArea,        in: query, description: Keep routines whose goal maps to this body area, schema: { $ref: "#/components/schemas/BodyArea" } }
        - { name: avoidBodyArea,   in: query, description: Drop routines whose goal maps to this body area, schema: { $ref: "#/components/schemas/BodyArea" } }
        - { name: durationBucket,  in: query, description: "short=≤5min, medium=5–15min, long=>15min", schema: { type: string, enum: [short, medium, long] } }
        - { name: safetyFlag,      in: query, description: When true, drops deep-intensity routines (Phase-11 replaces with caution-tag filter), schema: { type: boolean } }
        - { name: limit,           in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: offset,          in: query, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        "200":
          description: Paginated routine list
          content:
            application/json:
              schema:
                type: object
                required: [data, total, limit, offset]
                properties:
                  data:   { type: array, items: { $ref: "#/components/schemas/Routine" } }
                  total:  { type: integer }
                  limit:  { type: integer }
                  offset: { type: integer }
        "400": { $ref: "#/components/responses/ValidationError" }
    post:
      tags: [catalog]
      summary: Create a routine
      description: Creates a user- or AI-generated routine. Will become auth-required in Phase 3.
      operationId: createRoutine
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRoutine" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Routine" }
        "400": { $ref: "#/components/responses/InvalidJson" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /routines/{id}:
    get:
      tags: [catalog]
      summary: Get routine by ID or slug
      operationId: getRoutine
      parameters:
        - name: id
          in: path
          required: true
          description: UUID or slug
          schema: { type: string }
      responses:
        "200":
          description: Routine with ordered stretches
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/RoutineWithStretches" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sessions:
    post:
      tags: [sessions]
      summary: Start a workout session
      description: |
        Requires an authenticated session cookie. The `userId` is taken from
        the session — the request body only names the routine.
      operationId: startSession
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartSession" }
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Session" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /sessions/{id}:
    patch:
      tags: [sessions]
      summary: Update a session (completion, pain feedback, skipped stretches)
      description: |
        Requires an authenticated session cookie. A session that belongs to
        another user is reported as `NOT_FOUND` to prevent workspace
        enumeration (`SECURITY_RULES.md §Authorization`).
      operationId: updateSession
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSession" }
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Session" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /progress:
    get:
      tags: [progress]
      summary: Get progress summary + history for the signed-in user
      description: |
        Requires an authenticated session cookie. `userId` is always the
        session user; it is not accepted from the query string.
      operationId: getProgress
      security:
        - sessionCookie: []
      parameters:
        - { name: days, in: query, schema: { type: integer, minimum: 1, maximum: 365, default: 30 } }
      responses:
        "200":
          description: Progress summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Progress" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /me:
    get:
      tags: [profile]
      summary: Get the signed-in user's profile
      description: |
        Returns the onboarding-captured profile for the session user. The
        `safetyFlag` is a derived boolean — the underlying pre-existing-
        condition answers are never persisted (see `HEALTH_RULES.md`).
      operationId: getMe
      security:
        - sessionCookie: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/UserProfile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [profile]
      summary: Update the signed-in user's profile
      description: |
        Partial update. Any subset of fields is accepted. The optional
        `conditions` sub-object (four booleans) is reduced to `safetyFlag`
        server-side and then discarded — individual answers are not
        persisted (privacy per `HEALTH_RULES.md`).
      operationId: updateMe
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProfile" }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/UserProfile" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: |
        Auth.js v5 session cookie. Issued by `/api/auth/callback/...` and
        required on every protected route. In production the cookie name
        is `__Secure-authjs.session-token`.

  responses:
    InvalidJson:
      description: Malformed JSON body
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Request failed schema validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ValidationFailure" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: No valid session cookie on the request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    BodyArea:
      type: string
      enum: [neck, shoulders, chest, upper_back, lower_back, hips, glutes,
             quads, hamstrings, calves, ankles, wrists, full_body]
    Intensity:
      type: string
      enum: [gentle, moderate, deep]
    Goal:
      type: string
      enum: [flexibility, mobility, recovery, stress_relief, posture,
             athletic_performance, pain_relief]

    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - INVALID_JSON
        - NOT_FOUND
        - UNAUTHENTICATED
        - FORBIDDEN
        - CONFLICT
        - RATE_LIMITED
        - INTERNAL

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:    { $ref: "#/components/schemas/ErrorCode" }
            message: { type: string }
            details:
              description: Optional structured details (e.g. Zod issue list).
              oneOf:
                - { type: object, additionalProperties: true }
                - { type: array,  items: { type: object, additionalProperties: true } }

    ValidationFailure:
      # Retained as an alias for Error so existing references still resolve.
      # Validation failures carry details = array of Zod issues.
      allOf:
        - $ref: "#/components/schemas/Error"

    Stretch:
      type: object
      required:
        - id
        - slug
        - name
        - instructions
        - cues
        - cautions
        - bodyAreas
        - intensity
        - bilateral
        - defaultDurationSec
        - createdAt
        - updatedAt
      properties:
        id:                 { type: string, format: uuid }
        slug:               { type: string }
        name:               { type: string }
        instructions:       { type: string }
        cues:               { type: array, items: { type: string } }
        cautions:           { type: array, items: { type: string } }
        bodyAreas:          { type: array, items: { $ref: "#/components/schemas/BodyArea" } }
        intensity:          { $ref: "#/components/schemas/Intensity" }
        bilateral:          { type: boolean }
        defaultDurationSec: { type: integer, minimum: 1 }
        mediaUrl:           { type: [string, "null"], format: uri }
        thumbnailUrl:       { type: [string, "null"], format: uri }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }

    Routine:
      type: object
      required:
        - id
        - slug
        - title
        - goal
        - level
        - totalDurationSec
        - isPremium
        - isAiGenerated
        - createdAt
        - updatedAt
      properties:
        id:               { type: string, format: uuid }
        slug:             { type: string }
        title:            { type: string }
        description:      { type: [string, "null"] }
        goal:             { $ref: "#/components/schemas/Goal" }
        level:            { $ref: "#/components/schemas/Intensity" }
        totalDurationSec: { type: integer, minimum: 1 }
        isPremium:        { type: boolean }
        isAiGenerated:    { type: boolean }
        ownerId:          { type: [string, "null"], format: uuid }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }

    CreateRoutine:
      description: Routine minus server-generated fields
      type: object
      required: [slug, title, goal, level, totalDurationSec, isPremium, isAiGenerated]
      properties:
        slug:             { type: string }
        title:            { type: string }
        description:      { type: [string, "null"] }
        goal:             { $ref: "#/components/schemas/Goal" }
        level:            { $ref: "#/components/schemas/Intensity" }
        totalDurationSec: { type: integer, minimum: 1 }
        isPremium:        { type: boolean }
        isAiGenerated:    { type: boolean }
        ownerId:          { type: [string, "null"], format: uuid }

    RoutineStretchEntry:
      type: object
      required: [id, routineId, stretchId, orderIndex, durationSec, stretch]
      properties:
        id:          { type: string, format: uuid }
        routineId:   { type: string, format: uuid }
        stretchId:   { type: string, format: uuid }
        orderIndex:  { type: integer, minimum: 0 }
        durationSec: { type: integer, minimum: 1 }
        sideFirst:   { type: [string, "null"] }
        stretch:     { $ref: "#/components/schemas/Stretch" }

    RoutineWithStretches:
      allOf:
        - $ref: "#/components/schemas/Routine"
        - type: object
          required: [routineStretches]
          properties:
            routineStretches:
              type: array
              items: { $ref: "#/components/schemas/RoutineStretchEntry" }

    StartSession:
      type: object
      required: [routineId]
      properties:
        routineId: { type: string, format: uuid }

    UpdateSession:
      type: object
      properties:
        durationDoneSec:   { type: integer, minimum: 0 }
        completionPct:     { type: number, minimum: 0, maximum: 100 }
        skippedStretchIds: { type: array, items: { type: string, format: uuid } }
        painFeedback:
          type: object
          additionalProperties: { type: integer, minimum: 0, maximum: 10 }
        completed:         { type: boolean }

    Session:
      type: object
      required:
        - id
        - userId
        - startedAt
        - durationDoneSec
        - completionPct
        - skippedStretchIds
        - painFeedback
        - createdAt
      properties:
        id:                { type: string, format: uuid }
        userId:            { type: string, format: uuid }
        routineId:         { type: [string, "null"], format: uuid }
        startedAt:         { type: string, format: date-time }
        completedAt:       { type: [string, "null"], format: date-time }
        durationDoneSec:   { type: integer, minimum: 0 }
        completionPct:     { type: number, minimum: 0, maximum: 100 }
        skippedStretchIds: { type: array, items: { type: string, format: uuid } }
        painFeedback:
          type: object
          additionalProperties: { type: integer, minimum: 0, maximum: 10 }
        createdAt:         { type: string, format: date-time }

    Progress:
      type: object
      required:
        - currentStreak
        - longestStreak
        - totalSessions
        - totalMinutes
        - thisWeekMinutes
        - thisMonthMinutes
        - avgCompletionPct
        - activeDays
        - history
      properties:
        currentStreak:     { type: integer, minimum: 0 }
        longestStreak:     { type: integer, minimum: 0 }
        totalSessions:     { type: integer, minimum: 0 }
        totalMinutes:      { type: integer, minimum: 0 }
        thisWeekMinutes:   { type: integer, minimum: 0 }
        thisMonthMinutes:  { type: integer, minimum: 0 }
        avgCompletionPct:  { type: number, minimum: 0, maximum: 100 }
        activeDays:        { type: array, items: { type: string } }
        history:
          type: array
          items:
            type: object
            required: [date, minutesStretched, sessionsCompleted, completionPct]
            properties:
              date:              { type: string, description: "ISO date (YYYY-MM-DD)" }
              minutesStretched:  { type: integer, minimum: 0 }
              sessionsCompleted: { type: integer, minimum: 0 }
              completionPct:     { type: number, minimum: 0, maximum: 100 }

    UserProfile:
      type: object
      required:
        - userId
        - goals
        - focusAreas
        - avoidAreas
        - safetyFlag
        - reminderTime
        - timezone
        - onboardedAt
      properties:
        userId:       { type: string, format: uuid }
        goals:        { type: array, items: { $ref: "#/components/schemas/Goal" } }
        focusAreas:   { type: array, items: { $ref: "#/components/schemas/BodyArea" } }
        avoidAreas:   { type: array, items: { $ref: "#/components/schemas/BodyArea" } }
        safetyFlag:
          type: boolean
          description: |
            True when the user answered "yes" to any pre-existing-condition
            question during onboarding. The individual answers are never
            persisted (see HEALTH_RULES §Pre-Existing Condition Gating).
        reminderTime:
          type: string
          nullable: true
          pattern: '^\d{2}:\d{2}$'
        timezone:     { type: string, example: "America/Los_Angeles" }
        onboardedAt:
          type: string
          format: date-time
          nullable: true

    PreExistingConditions:
      type: object
      description: |
        Pre-existing-condition booleans accepted by PATCH /me to compute
        `safetyFlag`. The server discards these after computing the flag;
        they are NEVER persisted.
      required: [recentInjury, recentSurgery, jointOrSpineCondition, pregnancy]
      additionalProperties: false
      properties:
        recentInjury:           { type: boolean }
        recentSurgery:          { type: boolean }
        jointOrSpineCondition:  { type: boolean }
        pregnancy:              { type: boolean }

    UpdateProfile:
      type: object
      additionalProperties: false
      properties:
        goals:
          type: array
          maxItems: 7
          items: { $ref: "#/components/schemas/Goal" }
        focusAreas:
          type: array
          maxItems: 13
          items: { $ref: "#/components/schemas/BodyArea" }
        avoidAreas:
          type: array
          maxItems: 13
          items: { $ref: "#/components/schemas/BodyArea" }
        reminderTime:
          type: string
          nullable: true
          pattern: '^\d{2}:\d{2}$'
        timezone:  { type: string, minLength: 1, maxLength: 64 }
        conditions: { $ref: "#/components/schemas/PreExistingConditions" }
        markOnboarded:
          type: boolean
          description: When true, sets `onboardedAt` to the server's current time.
